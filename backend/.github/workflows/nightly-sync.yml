name: Nightly Music Sync with Alerts

on:
  schedule:
    - cron: '0 2 * * *'       # 2 AM UTC daily
  workflow_dispatch:           # Manual trigger

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Run migration script
        id: migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

  notify-success:
    needs: scrape-and-sync
    if: ${{ always() && needs.scrape-and-sync.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send success email (optional)
        # You can skip this if you only want failure alerts
        run: echo "Sync succeeded. No email sent."

  notify-failure:
    needs: scrape-and-sync
    if: ${{ always() && needs.scrape-and-sync.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ West Nile Music Sync FAILED"
          to: your-email@example.com
          from: Music Sync Bot
          body: |
            The nightly music sync job has failed.
            
            View the logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}